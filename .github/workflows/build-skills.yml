name: Build and Release Skills

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build .skill files
        run: |
          mkdir -p dist
          # Iterate through all directories in the repository
          for dir in */; do
            # Remove the trailing slash from the directory name
            dir=${dir%/}
            
            # Check if the directory is a valid skill (contains a SKILL.md)
            if [ -f "$dir/SKILL.md" ]; then
              echo "📦 Packaging $dir..."
              cd "$dir"
              # A .skill file is just a zip archive with the contents at the root
              zip -r "../dist/$dir.skill" .
              cd ..
            fi
          done

      - name: Upload Skills as Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-skills
          path: dist/*.skill

      - name: Upload to GitHub Release
        # Only run this step if the push is a tag starting with 'v' (e.g., v1.0.0)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
